<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>robertquick.org // omni v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #02060a;
    --orange: #ff8c1a;
    --orange-bright: #ffae5e;
    --orange-dim: rgba(255,140,26,0.55);
    --orange-faint: rgba(255,140,26,0.18);
    --cyan: #58e1ff;
    --cyan-dim: rgba(88,225,255,0.55);
    --white: #f4ecdf;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--orange);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  #rain {
    position: fixed; inset: 0;
    z-index: 0;
    opacity: 0.07;
    pointer-events: none;
  }
  body::before {
    content: ""; position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px);
    z-index: 1; pointer-events: none;
  }
  body::after {
    content: ""; position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.7) 100%);
    z-index: 2; pointer-events: none;
  }
  /* hologram flicker */
  @keyframes holo-flicker {
    0%, 97%, 100% { opacity: 1; }
    98% { opacity: 0.94; }
    99% { opacity: 0.98; }
  }
  main, .hud, .topbar, .readout, .ticker, .comm, .dossier {
    animation: holo-flicker 18s infinite;
  }

  /* ── HUD frame: hex corners ───────────────────────── */
  .hud {
    position: fixed;
    inset: 18px;
    z-index: 3;
    pointer-events: none;
  }
  .hud .corner {
    position: absolute;
    width: 36px; height: 36px;
    border: 2px solid var(--orange-dim);
  }
  .hud .corner.tl {
    top: 0; left: 0;
    clip-path: polygon(0 0, 60% 0, 100% 30%, 100% 100%, 0 100%);
    border-right: none; border-bottom: none;
  }
  .hud .corner.tr {
    top: 0; right: 0;
    clip-path: polygon(40% 0, 100% 0, 100% 100%, 0 100%, 0 30%);
    border-left: none; border-bottom: none;
  }
  .hud .corner.bl {
    bottom: 0; left: 0;
    clip-path: polygon(0 0, 100% 0, 100% 100%, 60% 100%, 0 70%);
    border-right: none; border-top: none;
  }
  .hud .corner.br {
    bottom: 0; right: 0;
    clip-path: polygon(0 0, 100% 0, 100% 70%, 40% 100%, 0 100%);
    border-left: none; border-top: none;
  }

  .hud-label {
    position: absolute;
    color: var(--orange-dim);
    font-size: 11px;
    letter-spacing: 0.22em;
  }
  .hud-label.top    { top: 6px; left: 50%; transform: translateX(-50%); white-space: nowrap; }
  .hud-label.bottom { bottom: 38px; left: 50%; transform: translateX(-50%); white-space: nowrap; }
  .hud-label.left   { top: 50%; left: 6px; transform: translateY(-50%) rotate(-90deg); transform-origin: left center; }
  .hud-label.right  { top: 50%; right: 6px; transform: translateY(-50%) rotate(90deg); transform-origin: right center; }

  /* Top bar — right-aligned to avoid colliding with hud-label-top and dossier */
  .topbar {
    position: fixed;
    top: 32px; right: 56px;
    z-index: 4;
    color: var(--orange-dim);
    font-size: 11px;
    letter-spacing: 0.3em;
  }
  .topbar .live { color: var(--cyan); }
  .topbar .live::before { content: "◆ "; color: var(--cyan); }

  /* Dossier link top-left */
  .dossier {
    position: fixed;
    top: 30px; left: 56px;
    z-index: 5;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--cyan-dim);
    text-decoration: none;
    border-left: 2px solid var(--cyan);
    padding-left: 8px;
    pointer-events: auto;
  }
  .dossier:hover { color: var(--cyan); }

  /* Comm widget — top-right under topbar */
  .comm {
    position: fixed;
    top: 56px; right: 56px;
    z-index: 4;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--orange-dim);
    border: 1px solid var(--orange-faint);
    padding: 6px 10px 6px 14px;
    clip-path: polygon(8px 0, 100% 0, 100% 100%, 0 100%, 0 8px);
    background: rgba(0,0,0,0.4);
    line-height: 1.5;
  }
  .comm .key { color: var(--cyan-dim); }

  /* Telemetry ticker */
  .ticker {
    position: fixed;
    bottom: 14px; left: 0; right: 0;
    z-index: 4;
    color: var(--orange-faint);
    font-size: 10.5px;
    letter-spacing: 0.18em;
    overflow: hidden;
    white-space: nowrap;
    text-align: center;
  }
  .ticker-track {
    display: inline-block;
    padding-left: 100%;
    animation: tick 80s linear infinite;
  }
  @keyframes tick { to { transform: translateX(-100%); } }

  /* Diagnostic flash line above ticker */
  .diag {
    position: fixed;
    bottom: 28px; left: 0; right: 0;
    z-index: 4;
    text-align: center;
    color: var(--cyan-dim);
    font-size: 10.5px;
    letter-spacing: 0.2em;
    opacity: 0;
    transition: opacity 0.18s;
  }
  .diag.show { opacity: 1; }

  /* Center stage */
  main {
    position: relative; z-index: 3;
    height: 100%; display: flex;
    align-items: center; justify-content: center;
  }
  .ring-wrap {
    position: relative;
    width: min(82vmin, 640px);
    aspect-ratio: 1 / 1;
  }
  .ring-svg {
    width: 100%; height: 100%;
    overflow: visible;
    filter: drop-shadow(0 0 12px rgba(255,140,26,0.25));
  }

  /* Segment styles */
  .seg {
    fill: rgba(255,140,26,0.06);
    stroke: var(--orange);
    stroke-width: 1.5;
    cursor: pointer;
    transition: fill 0.18s ease, stroke 0.18s ease;
  }
  .seg:hover, .seg.focus {
    fill: rgba(255,140,26,0.22);
    stroke: var(--cyan);
    filter: drop-shadow(0 0 8px rgba(88,225,255,0.6));
  }
  .seg.flash {
    animation: segflash 0.55s ease-out;
  }
  @keyframes segflash {
    0%   { fill: rgba(88,225,255,0.4); }
    100% { fill: rgba(255,140,26,0.06); }
  }
  .seg.activate {
    animation: segactivate 0.32s ease-in forwards;
  }
  @keyframes segactivate {
    0%   { fill: rgba(255,140,26,0.06); }
    100% { fill: rgba(255,140,26,0.95); }
  }

  .seg-num {
    fill: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    pointer-events: none;
    text-anchor: middle;
    dominant-baseline: middle;
    opacity: 0.7;
  }
  .seg-label {
    fill: var(--orange);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    pointer-events: none;
    text-anchor: middle;
    dominant-baseline: middle;
  }

  /* Tick marks */
  .tick { stroke: var(--orange-dim); stroke-width: 1; }
  .tick.major { stroke: var(--orange); stroke-width: 1.5; }
  .tick-num {
    fill: var(--cyan-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 8.5px;
    letter-spacing: 0.1em;
    text-anchor: middle;
    dominant-baseline: middle;
  }

  /* Hex containment frame */
  .hex-frame {
    fill: none;
    stroke: var(--orange-faint);
    stroke-width: 1.2;
    transform-origin: 50% 50%;
    animation: hexrot 60s linear infinite;
  }
  @keyframes hexrot { to { transform: rotate(360deg); } }

  /* Sonar pulse */
  .sonar {
    fill: none;
    stroke: var(--orange);
    stroke-width: 1.2;
    transform-origin: 50% 50%;
    animation: sonar 4.2s ease-out infinite;
    opacity: 0;
  }
  @keyframes sonar {
    0%   { r: 60; opacity: 0; }
    20%  { opacity: 0.5; }
    100% { r: 175; opacity: 0; }
  }

  /* Orbiting tracer */
  .tracer-orbit {
    fill: none;
    stroke: none;
  }
  .tracer {
    fill: var(--cyan);
    filter: drop-shadow(0 0 6px var(--cyan));
  }

  /* Hub */
  .hub-bg { fill: rgba(0,0,0,0.85); stroke: var(--orange); stroke-width: 1.5; }
  .hub-hex {
    fill: none; stroke: var(--orange-dim); stroke-width: 1;
    transform-origin: 50% 50%;
    animation: hubhex 24s linear infinite;
  }
  @keyframes hubhex { to { transform: rotate(-360deg); } }
  .hub-name {
    fill: var(--white);
    font-family: 'VT323', monospace;
    font-size: 26px;
    letter-spacing: 0.08em;
    text-anchor: middle;
    dominant-baseline: middle;
  }
  .hub-sub {
    fill: var(--cyan-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.32em;
    text-anchor: middle;
  }
  /* Heartbeat ECG */
  .ecg-frame {
    fill: rgba(0,0,0,0.5);
    stroke: var(--orange-faint);
    stroke-width: 0.5;
  }
  .ecg-line {
    fill: none;
    stroke: var(--cyan);
    stroke-width: 1.2;
    filter: drop-shadow(0 0 3px var(--cyan));
  }
  .hub-pulse {
    transform-origin: 50% 50%;
  }

  /* ─── Codex card readout ─── */
  .readout {
    position: fixed;
    left: 50%;
    bottom: 76px;
    transform: translateX(-50%);
    z-index: 5;
    width: min(620px, 90vw);
    color: var(--orange);
    background:
      linear-gradient(rgba(2,6,10,0.92), rgba(2,6,10,0.92)),
      repeating-linear-gradient(60deg,
        rgba(255,140,26,0.06) 0 1px,
        transparent 1px 14px),
      repeating-linear-gradient(-60deg,
        rgba(255,140,26,0.06) 0 1px,
        transparent 1px 14px);
    border: 1px solid var(--orange);
    clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
    padding: 0.85rem 1.1rem 0.85rem 1.3rem;
    font-size: 12.5px;
    letter-spacing: 0.06em;
    line-height: 1.55;
    opacity: 0;
    transition: opacity 0.18s ease;
    box-shadow: 0 0 18px rgba(255,140,26,0.16), inset 3px 0 0 var(--orange);
  }
  .readout.show { opacity: 1; }
  .readout .codex-title {
    color: var(--white);
    font-size: 14px;
    letter-spacing: 0.18em;
    border-bottom: 1px solid var(--cyan-dim);
    padding-bottom: 4px;
    margin-bottom: 6px;
  }
  .readout .row { display: flex; gap: 0.8em; }
  .readout .row .key { color: var(--cyan); min-width: 110px; }
  .readout .row .val { color: var(--orange); }
  .readout .stamp {
    position: absolute;
    bottom: 6px; right: 14px;
    color: var(--orange-faint);
    font-size: 10px;
    letter-spacing: 0.2em;
  }
  .readout .empty { color: var(--orange-dim); }

  /* HUD label dynamic injection (idle diagnostics overwrites) */
  .swap { transition: opacity 0.2s; }
</style>
</head>
<body>
<canvas id="rain"></canvas>

<div class="hud">
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>
  <span class="hud-label top">[ OMNI-TOOL // v7.8 ]</span>
  <span class="hud-label bottom" id="hud-bottom">[ SELECT VECTOR ]</span>
  <span class="hud-label left">[ SIGNAL // OK ]</span>
  <span class="hud-label right">[ RELAY // ROBERTQUICK ]</span>
</div>

<div class="topbar"><span class="live">LIVE</span> &nbsp;//&nbsp; <span id="clock">--:--:--</span> UTC &nbsp;//&nbsp; SESSION ACTIVE</div>

<a href="/about" class="dossier">▶ DOSSIER //</a>

<div class="comm">
  <div><span class="key">COMM ▸</span> 7.81 GHz</div>
  <div><span class="key">CHAN ▸</span> 7/8 // OK</div>
</div>

<main>
  <div class="ring-wrap">
    <svg class="ring-svg" viewBox="-200 -200 400 400" id="ring"></svg>
  </div>
</main>

<div class="diag" id="diag"></div>
<div class="ticker"><div class="ticker-track" id="ticker"></div></div>

<div class="readout" id="readout">
  <div class="empty">// hover a vector — the omni-tool will read it out</div>
</div>

<script>
const vectors = [
  { id: 'simulacra',    label: 'SIMULACRA',    desc: 'frameworks under stress',     status: 'ACTIVE',    last: '2d ago',  count: '10 thinkers' },
  { id: 'frequencies',  label: 'FREQUENCIES',  desc: 'domains of inquiry',          status: 'ACTIVE',    last: '5d ago',  count: '8 nodes'    },
  { id: 'paradox',      label: 'PARADOX',      desc: 'load-bearing contradictions', status: 'OPEN',      last: '11d ago', count: '9 entries'  },
  { id: 'counterpoint', label: 'COUNTERPOINT', desc: 'music as critique',           status: 'TUNED',     last: '6d ago',  count: '5 voices'   },
  { id: 'archive',      label: 'ARCHIVE',      desc: 'annotated reading',           status: 'INDEXED',   last: '1d ago',  count: '13 entries' },
  { id: 'now',          label: 'NOW',          desc: 'current state',               status: 'STREAMING', last: '4h ago',  count: 'live'       },
  { id: 'connect',      label: 'CONNECT',      desc: 'open channels',               status: 'LISTEN',    last: 'static',  count: '3 vectors'  },
];

const SVGNS = 'http://www.w3.org/2000/svg';
const ring = document.getElementById('ring');
const readout = document.getElementById('readout');
const diag = document.getElementById('diag');

const N = vectors.length;
const innerR = 72;
const midR   = 142;
const labelR = 116;
const numR   = 132;
const startAngle = -Math.PI / 2;
const sweep = (2 * Math.PI) / N;
const gap = 0.028;

function el(name, attrs={}) {
  const e = document.createElementNS(SVGNS, name);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

// Hex containment frame
(function() {
  const r = 188;
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * 2 * Math.PI - Math.PI/2;
    pts.push(`${r*Math.cos(a)},${r*Math.sin(a)}`);
  }
  ring.appendChild(el('polygon', { points: pts.join(' '), class: 'hex-frame' }));
})();

// Tick marks + cardinal numbers
for (let i = 0; i < 60; i++) {
  const a = (i / 60) * 2 * Math.PI - Math.PI/2;
  const major = i % 5 === 0;
  const r0 = 162, r1 = major ? 175 : 170;
  ring.appendChild(el('line', {
    x1: r0*Math.cos(a), y1: r0*Math.sin(a),
    x2: r1*Math.cos(a), y2: r1*Math.sin(a),
    class: 'tick' + (major ? ' major' : '')
  }));
}
['000','090','180','270'].forEach((txt, i) => {
  const a = (i / 4) * 2 * Math.PI - Math.PI/2;
  const r = 184;
  const t = el('text', { x: r*Math.cos(a), y: r*Math.sin(a), class: 'tick-num' });
  t.textContent = txt;
  ring.appendChild(t);
});

// Segments with angular trailing-edge cut
const segNodes = [];
vectors.forEach((v, i) => {
  const a0 = startAngle + i * sweep + gap/2;
  const a1 = startAngle + (i+1) * sweep - gap/2;
  const cut = 0.04; // small angular cut at trailing edge
  const aMid = a1 - cut;
  const x0 = innerR * Math.cos(a0), y0 = innerR * Math.sin(a0);
  const x1 = midR   * Math.cos(a0), y1 = midR   * Math.sin(a0);
  const x2 = midR   * Math.cos(aMid),y2 = midR   * Math.sin(aMid);
  // chamfer point at trailing edge
  const xC = (midR-10) * Math.cos(a1), yC = (midR-10) * Math.sin(a1);
  const x3 = innerR * Math.cos(a1), y3 = innerR * Math.sin(a1);
  const large = (a1 - a0) > Math.PI ? 1 : 0;

  const d = `M ${x0} ${y0} L ${x1} ${y1}
             A ${midR} ${midR} 0 ${large} 1 ${x2} ${y2}
             L ${xC} ${yC}
             L ${x3} ${y3}
             A ${innerR} ${innerR} 0 ${large} 0 ${x0} ${y0} Z`;

  const path = el('path', { d, class: 'seg', 'data-id': v.id, 'data-idx': i });
  path.addEventListener('click', () => activateAndGo(i));
  path.addEventListener('mouseenter', () => { focusIdx = i; showReadout(v); paintFocus(); });
  path.addEventListener('mouseleave', () => { clearReadout(); });
  ring.appendChild(path);
  segNodes.push(path);

  const am = (a0 + a1) / 2;
  // index number above label (straight text, narrow — fits at any angle)
  const numText = el('text', { x: numR*Math.cos(am), y: numR*Math.sin(am), class: 'seg-num' });
  numText.textContent = String(i+1).padStart(2,'0');
  ring.appendChild(numText);

  // Curved label along an arc at radius labelR.
  // For top half, arc runs a0 → a1 (text upright).
  // For bottom half, reverse direction so text isn't upside-down.
  const inBottom = Math.sin(am) > 0;
  const r = labelR;
  const pa0 = a0 + 0.06, pa1 = a1 - 0.06;
  let xa, ya, xb, yb, sweepFlag;
  if (!inBottom) {
    xa = r*Math.cos(pa0); ya = r*Math.sin(pa0);
    xb = r*Math.cos(pa1); yb = r*Math.sin(pa1);
    sweepFlag = 1;
  } else {
    xa = r*Math.cos(pa1); ya = r*Math.sin(pa1);
    xb = r*Math.cos(pa0); yb = r*Math.sin(pa0);
    sweepFlag = 0;
  }
  const labelPath = el('path', {
    d: `M ${xa} ${ya} A ${r} ${r} 0 0 ${sweepFlag} ${xb} ${yb}`,
    fill: 'none', stroke: 'none', id: `labelpath-${i}`
  });
  ring.appendChild(labelPath);

  const lbl = el('text', { class: 'seg-label' });
  const tp = el('textPath', { href: `#labelpath-${i}`, startOffset: '50%' });
  tp.setAttribute('text-anchor', 'middle');
  tp.textContent = v.label;
  lbl.appendChild(tp);
  ring.appendChild(lbl);
});

// Sonar pulse
ring.appendChild(el('circle', { cx: 0, cy: 0, r: 60, class: 'sonar' }));

// Orbiting tracer
(function() {
  const orbit = el('circle', { cx: 0, cy: 0, r: 195, class: 'tracer-orbit', id: 'tracer-orbit' });
  ring.appendChild(orbit);
  const tracer = el('circle', { cx: 0, cy: -195, r: 2.5, class: 'tracer', id: 'tracer' });
  ring.appendChild(tracer);
})();

// Hub
ring.appendChild(el('circle', { cx: 0, cy: 0, r: innerR-4, class: 'hub-bg' }));
// rotating hex inside hub
(function() {
  const r = innerR - 14;
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * 2 * Math.PI;
    pts.push(`${r*Math.cos(a)},${r*Math.sin(a)}`);
  }
  ring.appendChild(el('polygon', { points: pts.join(' '), class: 'hub-hex' }));
})();
const nameText = el('text', { x: 0, y: -14, class: 'hub-name' });
nameText.textContent = 'R. QUICK';
ring.appendChild(nameText);
const subText = el('text', { x: 0, y: 8, class: 'hub-sub' });
subText.textContent = '7/8';
ring.appendChild(subText);

// ECG window inside hub
ring.appendChild(el('rect', { x: -32, y: 18, width: 64, height: 14, class: 'ecg-frame' }));
const ecgLine = el('polyline', { class: 'ecg-line', points: '' });
ring.appendChild(ecgLine);

// 7/8 heartbeat: emphasize beats 1, 4, 6 (ME-style irregular pulse)
const ecgWidth = 64, ecgHeight = 14;
const ecgX0 = -32, ecgY0 = 18;
const beats = [1, 0.2, 0.2, 1, 0.2, 1, 0.2]; // 7/8 emphasis
function buildEcg(t) {
  // t in [0,1] across the bar = one full 7/8 measure
  const samples = 80;
  const pts = [];
  for (let i = 0; i < samples; i++) {
    const x = ecgX0 + (i / (samples-1)) * ecgWidth;
    const beat = (i / (samples-1)) * 7; // 0..7
    const phase = beat - Math.floor(beat);
    const idx = Math.floor(beat) % 7;
    const amp = beats[idx];
    let y = ecgY0 + ecgHeight/2;
    // sharp spike near phase 0.1
    if (phase < 0.06) y -= amp * (ecgHeight/2 - 1) * (phase/0.06);
    else if (phase < 0.12) y -= amp * (ecgHeight/2 - 1) * (1 - (phase-0.06)/0.06);
    else if (phase < 0.18) y += amp * 2 * ((phase-0.12)/0.06);
    else if (phase < 0.24) y += amp * 2 * (1 - (phase-0.18)/0.06);
    pts.push(`${x.toFixed(1)},${y.toFixed(2)}`);
  }
  return pts.join(' ');
}
ecgLine.setAttribute('points', buildEcg(0));

// 7/8 hub pulse: subtle scale of the name+hex on emphasis beats
const hubGroup = el('g', { class: 'hub-pulse' });
// We'll just animate via JS by setting transform on hub elements directly
let pulseStart = performance.now();
const measureMs = 2400; // one 7/8 measure ≈ 2.4s
function animatePulse() {
  const now = performance.now();
  const t = ((now - pulseStart) % measureMs) / measureMs; // 0..1
  const beat = t * 7;
  const idx = Math.floor(beat) % 7;
  const phase = beat - Math.floor(beat);
  const amp = beats[idx];
  // pulse on the leading edge of each emphasized beat
  let pulse = 0;
  if (phase < 0.18) pulse = amp * (1 - phase/0.18);
  const scale = 1 + pulse * 0.06;
  nameText.setAttribute('transform', `scale(${scale.toFixed(3)})`);
  // ecg shifts slowly
  ecgLine.setAttribute('points', buildEcg(t));
  // tracer orbits
  const orbitT = (now / 6000) * 2 * Math.PI;
  const tx = 195 * Math.cos(orbitT - Math.PI/2);
  const ty = 195 * Math.sin(orbitT - Math.PI/2);
  document.getElementById('tracer').setAttribute('cx', tx);
  document.getElementById('tracer').setAttribute('cy', ty);
  requestAnimationFrame(animatePulse);
}
requestAnimationFrame(animatePulse);

// ─── Readout (codex card) ───────────────────────
function showReadout(v) {
  readout.innerHTML = `
    <div class="codex-title">▶ ${v.label} //</div>
    <div class="row"><span class="key">▶ SUMMARY //</span><span class="val">${v.desc}</span></div>
    <div class="row"><span class="key">▶ STATUS  //</span><span class="val">${v.status}</span></div>
    <div class="row"><span class="key">▶ LAST PING //</span><span class="val">${v.last}</span></div>
    <div class="row"><span class="key">▶ CONTENT //</span><span class="val">${v.count}</span></div>
    <div class="stamp">// FILE 0${vectors.indexOf(v)+1} OF 07</div>
  `;
  readout.classList.add('show');
}
function clearReadout() {
  readout.innerHTML = '<div class="empty">// hover a vector — the omni-tool will read it out</div>';
  // keep it visible as idle prompt
}
clearReadout(); readout.classList.add('show');

// ─── Focus + paint ──────────────────────────────
let focusIdx = -1;
function paintFocus() {
  segNodes.forEach((s, j) => s.classList.toggle('focus', j === focusIdx));
}

// ─── Activation animation + nav ────────────────
function activateAndGo(i) {
  const seg = segNodes[i];
  seg.classList.add('activate');
  setTimeout(() => { window.location.href = '/' + vectors[i].id; }, 320);
}

// ─── Keyboard ───────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key >= '1' && e.key <= '7') {
    activateAndGo(parseInt(e.key, 10) - 1);
  } else if (e.key === 'ArrowRight' || e.key === 'Tab') {
    e.preventDefault();
    focusIdx = (focusIdx + 1 + N) % N;
    showReadout(vectors[focusIdx]); paintFocus();
  } else if (e.key === 'ArrowLeft') {
    focusIdx = (focusIdx - 1 + N) % N;
    showReadout(vectors[focusIdx]); paintFocus();
  } else if (e.key === 'Enter' && focusIdx >= 0) {
    activateAndGo(focusIdx);
  }
});

// ─── Idle micro-animations ──────────────────────
function randomIdle() {
  const i = Math.floor(Math.random() * N);
  segNodes[i].classList.add('flash');
  setTimeout(() => segNodes[i].classList.remove('flash'), 600);
  const messages = [
    `▶ DIAGNOSTIC // ${vectors[i].label} // OK`,
    `▶ SCAN // VECTOR 0${i+1} // NOMINAL`,
    `▶ HANDSHAKE // RELAY ${vectors[i].label} // OK`,
    `▶ INTEGRITY // 0${i+1}/07 // GREEN`,
  ];
  const msg = messages[Math.floor(Math.random()*messages.length)];
  diag.textContent = msg;
  diag.classList.add('show');
  setTimeout(() => diag.classList.remove('show'), 2400);
  // schedule next
  setTimeout(randomIdle, 9000 + Math.random()*7000);
}
setTimeout(randomIdle, 4500);

// ─── Telemetry ticker ───────────────────────────
const telemetry = [
  '// SIGNAL NOMINAL',
  '// ENTROPY 0.47 — DRIFTING',
  '// COHERENCE OK',
  '// MAP::TERRITORY DELTA RISING',
  '// 7/8 LOCK STABLE',
  '// CRITIQUE BANDWIDTH NARROW',
  '// HYPERREAL INDEX 0.91',
  '// PARADOX PRESSURE NOMINAL',
  '// SIMULATION DEPTH ∞',
  '// REFERENT NOT FOUND',
  '// ECHO INTEGRITY 0.84',
  '// SUBJECT/OBJECT GAP 7.8 NM',
];
document.getElementById('ticker').textContent =
  telemetry.concat(telemetry).join('   ·   ');

// ─── Clock ──────────────────────────────────────
const clock = document.getElementById('clock');
function tick() {
  const d = new Date();
  const p = (n) => n.toString().padStart(2, '0');
  clock.textContent = `${p(d.getUTCHours())}:${p(d.getUTCMinutes())}:${p(d.getUTCSeconds())}`;
}
tick(); setInterval(tick, 1000);

// ─── Matrix rain (orange-tinted) ────────────────
(function() {
  const canvas = document.getElementById('rain');
  const ctx = canvas.getContext('2d');
  let W, H, cols, drops;
  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789ABCDEF∂∫∑∏√∞≠≤≥∈∉⊂⊃';
  function init() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cols = Math.floor(W / 22);
    drops = Array.from({length: cols}, () => Math.random() * -80);
  }
  function draw() {
    ctx.fillStyle = 'rgba(2,6,10,0.07)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = '14px "Share Tech Mono", monospace';
    for (let i = 0; i < cols; i++) {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      const x = i * 22;
      const y = drops[i] * 22;
      if (Math.random() < 0.02)       ctx.fillStyle = '#ffae5e';
      else if (Math.random() < 0.04)  ctx.fillStyle = 'rgba(88,225,255,0.7)';
      else                            ctx.fillStyle = 'rgba(255,140,26,0.45)';
      ctx.fillText(ch, x, y);
      if (y > H && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
    requestAnimationFrame(draw);
  }
  init(); draw();
  window.addEventListener('resize', init);
})();
</script>
